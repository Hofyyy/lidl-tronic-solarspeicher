# Lidl TRONIC Solarspeicher 2.2 kWh (Marstek-Klon, Hoymiles HM-600)
# Tuya Product Category: bxsdy
#
# Doku & Repo: https://github.com/Hofyyy/lidl-tronic-solarspeicher
# Tuya-Code-Namen via ge38kun (https://github.com/make-all/tuya-local/issues/5164)
#
# Installation:
#   1. Diese Datei nach /config/custom_components/tuya_local/devices/ kopieren
#   2. tuya-local Integration in HA neu starten
#   3. Geraet manuell hinzufuegen: IP, Device ID, Local Key, Protocol 3.3
#
# Die Base64-DPs (3, 33, 101, 106, 114) sind als rohe String-Sensoren
# (category: diagnostic) eingebunden und push-only -- tuya-local
# empfaengt sie ueber seine persistente Verbindung. Dekodierung in HA
# via Template/AppDaemon (siehe README-Abschnitt "Base64 DPs in HA dekodieren").

name: Solarspeicher bxsdy
primary_entity:
  entity: sensor
  name: Batterie
  dps:
    - id: 1                                # battery_percentage
      type: integer
      name: sensor
      unit: "%"
      class: battery
    - id: 10                               # temp_current
      type: integer
      name: current_temperature
      unit: "°C"
      class: temperature
    - id: 2                                # remain_time
      type: integer
      name: remain_time
      unit: "min"
    - id: 4                                # fault
      type: bitfield
      name: fault
    - id: 109                              # charge_flag
      type: string
      name: charge_status

secondary_entities:
  - entity: sensor
    name: Energie
    dps:
      - id: 102                            # batt_char_total
        type: integer
        name: total_energy_charged
        unit: "kWh"
        class: energy
        mapping:
          - scale: 0.01
      - id: 103                            # batt_dischar_total
        type: integer
        name: total_energy_discharged
        unit: "kWh"
        class: energy
        mapping:
          - scale: 0.01
      - id: 104                            # electric_total (Ausgang/Verbrauch)
        type: integer
        name: total_output_energy
        unit: "kWh"
        class: energy
        mapping:
          - scale: 0.01
      - id: 37                             # reverse_energy_total (Solarerzeugung)
        type: integer
        name: total_solar_energy
        unit: "kWh"
        class: energy
        mapping:
          - scale: 0.01

  - entity: select
    name: Lademodus
    dps:
      - id: 105                            # charge_mode
        type: string
        name: option
        mapping:
          - dps_val: charge_first
            value: "Akku zuerst laden"
          - dps_val: charge_discharge
            value: "Laden und Entladen"

  - entity: select
    name: Temperatureinheit
    category: config
    dps:
      - id: 24                             # temp_set_enum
        type: string
        name: option
        mapping:
          - dps_val: c
            value: "°C"
          - dps_val: f
            value: "°F"

  - entity: number
    name: WR Leistungslimit
    dps:
      - id: 115                            # invt_power
        type: integer
        name: value
        unit: "W"
        range:
          min: 0
          max: 600

  - entity: number
    name: Entladetiefe DoD
    dps:
      - id: 107                            # discharge_limit
        type: integer
        name: value
        unit: "%"
        range:
          min: 1
          max: 100

  - entity: number
    name: WR Abschaltgrenze
    dps:
      - id: 108                            # batt_on_threshold
        type: integer
        name: value
        unit: "W"
        range:
          min: 0
          max: 600

  - entity: button
    name: Daten aktualisieren
    dps:
      - id: 111                            # force_reflesh
        type: boolean
        name: button

  # --- Base64-DPs (push-only): rohe Strings, Dekodierung via Template/AppDaemon ---
  - entity: sensor
    name: Batterie-Parameter (raw)
    category: diagnostic
    dps:
      - id: 3                              # battery_parameters
        type: string
        name: sensor
  - entity: sensor
    name: DC-Ausgang (raw)
    category: diagnostic
    dps:
      - id: 33                             # dc_message
        type: string
        name: sensor
  - entity: sensor
    name: PV-Eingang (raw)
    category: diagnostic
    dps:
      - id: 101                            # pv_dc_data (= pv_canshu / PV参数)
        type: string
        name: sensor
  - entity: sensor
    name: Entlade-Zeitfenster (raw)
    category: diagnostic
    dps:
      - id: 106                            # discharge_mode
        type: string
        name: sensor
  - entity: sensor
    name: WR-Typ (raw)
    category: diagnostic
    dps:
      - id: 114                            # invt_id
        type: string
        name: sensor

  # --- Vollstaendigkeit: interne / kritische DPs (per Tuya-Cloud-Spec, ge38kun) ---

  # WARNUNG: DP 110 (clear_elec) loescht beim Druecken die Lifetime-Energiezaehler
  # (DP 37 Solarerzeugung, DP 102 Ladung, DP 103 Entladung, DP 104 Ausgang).
  # Nicht ohne Bedacht ausloesen -- kein Undo. Bewusst in HA verfuegbar gemacht,
  # damit Werkstest/Reset moeglich ist; Typ-Annahme: boolean (Standard fuer
  # Tuya-Reset-Befehle, empirisch noch nicht verifiziert).
  - entity: button
    name: "Lifetime-Zaehler zuruecksetzen (DESTRUKTIV)"
    category: config
    dps:
      - id: 110                            # clear_elec
        type: boolean
        name: button

  - entity: sensor
    name: App-Heartbeat (raw)
    category: diagnostic
    dps:
      - id: 112                            # app_heart -- Typ nicht verifiziert, als string sicher
        type: string
        name: sensor

  - entity: sensor
    name: Batterie-Pack-Nummer
    category: diagnostic
    dps:
      - id: 113                            # pack_number -- konstant 0 bei 1-Pack-Geraet
        type: integer
        name: sensor
